name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
          # Laravel 13 requires PHP 8.3+ (already satisfied); add Laravel-specific
          # excludes here if newer releases drop PHP 8.3 support.
          - php: '8.3'
            laravel: '11.*'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, fileinfo
          coverage: none
          tools: composer:v2

      - name: Pin Laravel version
        run: |
          composer require "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/translation:${{ matrix.laravel }}" \
            "illuminate/validation:${{ matrix.laravel }}" \
            --no-update --no-interaction

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: '--prefer-dist --no-interaction'

      - name: Run Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPStan (level 10)
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Run Rector (dry-run)
        run: vendor/bin/rector --dry-run

      - name: Run Pest (unit + feature)
        run: vendor/bin/pest --colors=always
